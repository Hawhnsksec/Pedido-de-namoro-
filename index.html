<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta de Namoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Caveat', cursive;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            width: 100%;
            height: 100vh;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .content {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 4rem;
            color: #ff69b4;
            margin-bottom: 3rem;
            min-height: 80px;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1s ease-in 2.5s forwards;
        }

        button {
            padding: 1rem 2rem;
            font-size: 2rem;
            font-family: 'Caveat', cursive;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        #nao-btn {
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes typewriter {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        .typewriter {
            overflow: hidden;
            border-right: 3px solid #ff69b4;
            white-space: nowrap;
            animation: typewriter 2.5s steps(22, end);
        }

        /* Página de confirmação */
        .yes-page {
            display: none;
            width: 100%;
            height: 100%;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .yes-page.active {
            display: block;
        }

        .mute-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1000;
            background: none;
            border: none;
            padding: 0;
            box-shadow: none;
        }

        .gif-container {
            position: absolute;
            left: 30px;
            bottom: 80px;
            z-index: 20;
            width: 300px;
        }

        .gif-container img {
            width: 100%;
            height: auto;
        }

        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: 2rem;
            opacity: 0.7;
            animation: rise 4s ease-in infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) translateX(0) scale(1);
                opacity: 0;
            }
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 100;
            min-width: 400px;
            overflow: hidden;
        }

        .popup-header {
            background: linear-gradient(to right, #4a90e2, #357abd);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .popup-buttons {
            display: flex;
            gap: 8px;
        }

        .popup-btn {
            background: #4a90e2;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            transition: background 0.2s;
        }

        .popup-btn:hover {
            background: #357abd;
        }

        .popup-content {
            padding: 30px;
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #333;
            font-weight: bold;
        }

        .popup-footer {
            background: #f0f0f0;
            padding: 12px 16px;
            text-align: right;
            border-top: 1px solid #ddd;
        }

        .popup-footer button {
            padding: 6px 16px;
            font-size: 0.9rem;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .popup-footer button:hover {
            background: #357abd;
            transform: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 50;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Página inicial -->
    <div class="container" id="proposal-page">
        <div class="content">
            <h1 class="typewriter">Quer namorar comigo?</h1>
            <div class="buttons">
                <button onclick="goToYes()">Sim!</button>
                <button id="nao-btn" onmouseover="moveButton()">Não</button>
            </div>
        </div>
    </div>

    <!-- Página de confirmação -->
    <div class="yes-page" id="yes-page">
        <button class="mute-btn" onclick="toggleMute()">🔊</button>

        <div class="hearts-container" id="hearts-container"></div>

        <div class="gif-container">
            <img src="/Pedido-de-namoro-/assets/biubiubiu.png" alt="Happy character">
        </div>

        <!-- Popup -->
        <div class="overlay" id="overlay"></div>
        <div class="popup" id="popup">
            <div class="popup-header">
                <span>Mensagem.exe</span>
                <div class="popup-buttons">
                    <button class="popup-btn" onclick="minimizePopup()">□</button>
                    <button class="popup-btn" onclick="closePopup()">✕</button>
                </div>
            </div>
            <div class="popup-content">
                eu te amo, CABEÇUDA!!
            </div>
            <div class="popup-footer">
                <button onclick="closePopup()">OK</button>
            </div>
        </div>
    </div>

    <script>
        let textIndex = 0;
        const fullText = "Quer namorar comigo?";
        const h1 = document.querySelector('h1');

        // Typewriter effect
        function typeWriter() {
            if (textIndex < fullText.length) {
                h1.textContent += fullText.charAt(textIndex);
                textIndex++;
                setTimeout(typeWriter, 100);
            }
        }

        // Iniciar typewriter
        h1.textContent = '';
        typeWriter();

        // Mover botão "Não"
        function moveButton() {
            const btn = document.getElementById('nao-btn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Ir para página de confirmação
        function goToYes() {
            document.getElementById('proposal-page').style.display = 'none';
            document.getElementById('yes-page').classList.add('active');
            createHearts();
        }

        // Criar corações
        function createHearts() {
            const container = document.getElementById('hearts-container');
            for (let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(heart);
            }
        }

        // Controlar mudo
        function toggleMute() {
            const btn = document.querySelector('.mute-btn');
            btn.textContent = btn.textContent === '🔊' ? '🔇' : '🔊';
        }

        // Fechar popup
        function closePopup() {
            document.getElementById('popup').style.display = 'none';
            document.getElementById('overlay').classList.remove('active');
        }

        // Minimizar popup
        function minimizePopup() {
            // Apenas fecha por enquanto
            closePopup();
        }

        // Mostrar overlay quando popup aparece
        window.addEventListener('load', function() {
            document.getElementById('overlay').classList.add('active');
        });
    </script>
</body>
</html>
