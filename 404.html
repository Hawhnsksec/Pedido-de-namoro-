<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Proposta de Namoro</title>
    <script>
      // Redireciona para index.html mantendo a rota
      var pathname = window.location.pathname;
      var pathArray = pathname.split('/');
      
      // Remove o nome do repositório do caminho
      if (pathArray[1] === 'Pedido-de-namoro-') {
        pathArray.splice(1, 1);
      }
      
      var newPath = pathArray.join('/');
      if (newPath !== pathname) {
        window.location.replace(newPath);
      } else {
        window.location.replace('/Pedido-de-namoro-/');
      }
    </script>
  </head>
  <body>
  </body>
</html>
